<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WOFES AI v2 — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --deep:#03020a;--void:#060412;
  --card-bg:rgba(12,8,28,0.55);--card-border:rgba(255,255,255,0.08);
  --glass-bg:rgba(16,10,36,0.6);--white:#ffffff;
  --purple-bright:#c4a8ff;--purple-mid:#a78bfa;--purple-dark:#8b6fef;
  --blue-accent:#60a5fa;
  --msg-ai-bg:rgba(30,18,60,0.7);--msg-ai-border:rgba(139,111,239,0.25);
  --msg-user-bg:rgba(80,40,160,0.45);--msg-user-border:rgba(196,168,255,0.3);
  --input-bg:rgba(255,255,255,0.04);--input-border:rgba(255,255,255,0.1);
  --sidebar-w:300px;--header-h:64px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--deep);font-family:'DM Sans',system-ui,sans-serif;color:#fff}
#cosmos{position:fixed;inset:0;z-index:0}
.nebula{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:1;animation:nebula-drift 22s ease-in-out infinite alternate}
.n1{width:600px;height:500px;background:rgba(88,28,180,0.18);top:-10%;left:-5%;animation-duration:26s}
.n2{width:700px;height:600px;background:rgba(15,52,130,0.22);bottom:-15%;right:-8%;animation-duration:32s;animation-direction:alternate-reverse}
.n3{width:400px;height:350px;background:rgba(120,10,100,0.12);top:30%;left:50%;animation-duration:18s;animation-name:nebula-drift-center}
@keyframes nebula-drift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.06)}100%{transform:translate(-15px,25px) scale(0.96)}}
@keyframes nebula-drift-center{0%{transform:translateX(-50%) scale(1)}50%{transform:translateX(calc(-50% + 20px)) scale(1.06)}100%{transform:translateX(calc(-50% - 15px)) scale(0.96)}}
#app{position:relative;z-index:10;width:100%;height:100%;display:flex;flex-direction:column}

#header{height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 20px 0 24px;background:rgba(6,4,18,0.7);border-bottom:1px solid var(--card-border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;position:relative;z-index:20}
#header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(167,139,250,0.3),transparent)}
.header-left{display:flex;align-items:center;gap:12px}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#4f46e5);display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(124,58,237,0.5);flex-shrink:0}
.logo-mark svg{width:16px;height:16px}
.header-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;letter-spacing:-0.01em;background:linear-gradient(135deg,#ffffff 30%,#c4a8ff 70%,#8b6fef 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-right{display:flex;align-items:center;gap:10px}
.header-badge{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:3px 9px}
.avatar-btn{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,rgba(139,111,239,0.6),rgba(79,70,229,0.6));border:1px solid rgba(196,168,255,0.3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:box-shadow 0.2s,transform 0.2s;color:rgba(255,255,255,0.85);font-family:'Syne',sans-serif;font-size:0.75rem;font-weight:700}
.avatar-btn:hover{box-shadow:0 0 18px rgba(167,139,250,0.5);transform:scale(1.06)}
.logout-btn{display:flex;align-items:center;gap:6px;padding:6px 13px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,0.45);font-family:'DM Sans',sans-serif;font-size:0.72rem;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.logout-btn:hover{color:rgba(255,255,255,0.75);border-color:rgba(255,255,255,0.22);background:rgba(255,255,255,0.07)}

#body{flex:1;display:flex;overflow:hidden}
#chat-area{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--card-border);min-width:0}
#messages{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 28px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:rgba(139,111,239,0.3);border-radius:4px}
#messages::-webkit-scrollbar-thumb:hover{background:rgba(167,139,250,0.5)}

.msg-row{display:flex;gap:10px;max-width:72%;animation:msg-in 0.35s cubic-bezier(.22,1,.36,1) both}
@keyframes msg-in{from{opacity:0;transform:translateY(12px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-row.ai{align-self:flex-start}
.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#7c3aed,#4f46e5);display:flex;align-items:center;justify-content:center;margin-top:2px;box-shadow:0 0 12px rgba(124,58,237,0.4)}
.msg-avatar svg{width:14px;height:14px}
.bubble{padding:12px 16px;border-radius:16px;font-size:0.875rem;line-height:1.65;font-weight:400;letter-spacing:0.01em;position:relative;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);word-break:break-word}
.msg-row.ai .bubble{background:var(--msg-ai-bg);border:1px solid var(--msg-ai-border);border-radius:4px 16px 16px 16px;color:rgba(255,255,255,0.88);box-shadow:0 4px 24px rgba(0,0,0,0.3),0 0 0 1px rgba(139,111,239,0.1) inset}
.msg-row.ai .bubble::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,rgba(139,111,239,0.4),transparent);border-radius:4px 16px 0 0}
.msg-row.user .bubble{background:var(--msg-user-bg);border:1px solid var(--msg-user-border);border-radius:16px 4px 16px 16px;color:rgba(255,255,255,0.92);box-shadow:0 4px 24px rgba(0,0,0,0.3),0 0 20px rgba(139,111,239,0.1)}
.msg-meta{font-size:0.62rem;color:rgba(255,255,255,0.2);letter-spacing:0.05em;margin-top:5px;padding:0 4px}
.msg-row.user .msg-meta{text-align:right}

.typing-row{display:flex;gap:10px;align-self:flex-start;animation:msg-in 0.35s both}
.typing-bubble{padding:12px 18px;background:var(--msg-ai-bg);border:1px solid var(--msg-ai-border);border-radius:4px 16px 16px 16px;display:flex;align-items:center;gap:5px;backdrop-filter:blur(12px)}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(167,139,250,0.7);animation:dot-pulse 1.4s ease-in-out infinite}
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
@keyframes dot-pulse{0%,60%,100%{transform:scale(1);opacity:0.5}30%{transform:scale(1.4);opacity:1}}

#input-bar{padding:16px 20px;background:rgba(6,4,18,0.6);border-top:1px solid var(--card-border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;align-items:flex-end;gap:10px}
#msg-input{flex:1;min-height:46px;max-height:140px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:12px;padding:12px 16px;color:rgba(255,255,255,0.88);font-family:'DM Sans',sans-serif;font-size:0.875rem;line-height:1.5;resize:none;outline:none;overflow-y:auto;transition:border-color 0.25s,box-shadow 0.25s,background 0.25s}
#msg-input::placeholder{color:rgba(255,255,255,0.22)}
#msg-input:focus{border-color:rgba(139,111,239,0.55);background:rgba(139,111,239,0.05);box-shadow:0 0 0 3px rgba(139,111,239,0.12),0 0 20px rgba(139,111,239,0.1)}
#send-btn{width:46px;height:46px;flex-shrink:0;border-radius:12px;background:#ffffff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.22s cubic-bezier(.34,1.56,.64,1),box-shadow 0.22s;position:relative;overflow:hidden}
#send-btn::after{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(255,255,255,0.3),transparent 70%);opacity:0;transition:opacity 0.3s}
#send-btn:hover{transform:translateY(-2px) scale(1.06);box-shadow:0 0 24px rgba(255,255,255,0.4),0 8px 20px rgba(0,0,0,0.4)}
#send-btn:hover::after{opacity:1}
#send-btn:active{transform:scale(0.95)}
#send-btn svg{position:relative;z-index:1}

#sidebar{width:var(--sidebar-w);flex-shrink:0;display:flex;flex-direction:column;background:rgba(8,5,20,0.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid var(--card-border);flex-shrink:0}
.sidebar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sidebar-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(139,111,239,0.3),transparent)}
.sidebar-search{position:relative}
.sidebar-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.2);width:14px;height:14px;pointer-events:none}
.sidebar-search input{width:100%;height:34px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:0 12px 0 32px;color:rgba(255,255,255,0.7);font-family:'DM Sans',sans-serif;font-size:0.78rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.sidebar-search input::placeholder{color:rgba(255,255,255,0.2)}
.sidebar-search input:focus{border-color:rgba(139,111,239,0.4);box-shadow:0 0 0 2px rgba(139,111,239,0.1)}
#chat-list{flex:1;overflow-y:auto;padding:10px 12px}
#chat-list::-webkit-scrollbar{width:3px}
#chat-list::-webkit-scrollbar-thumb{background:rgba(139,111,239,0.25);border-radius:3px}
.chat-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all 0.2s;margin-bottom:4px;position:relative}
.chat-item:hover{background:rgba(139,111,239,0.1);border-color:rgba(139,111,239,0.18)}
.chat-item.active{background:rgba(139,111,239,0.15);border-color:rgba(139,111,239,0.3);box-shadow:0 0 16px rgba(139,111,239,0.1)}
.chat-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;background:var(--purple-mid);border-radius:2px;box-shadow:0 0 8px rgba(167,139,250,0.8)}
.chat-icon{width:34px;height:34px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.85rem;background:rgba(139,111,239,0.15);border:1px solid rgba(139,111,239,0.2);transition:box-shadow 0.2s}
.chat-item:hover .chat-icon,.chat-item.active .chat-icon{box-shadow:0 0 12px rgba(139,111,239,0.3)}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:0.82rem;font-weight:500;color:rgba(255,255,255,0.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.2s}
.chat-item:hover .chat-name,.chat-item.active .chat-name{color:rgba(255,255,255,0.95)}
.chat-preview{font-size:0.7rem;color:rgba(255,255,255,0.25);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-time{font-size:0.62rem;color:rgba(255,255,255,0.18);letter-spacing:0.04em;flex-shrink:0}
.unread-badge{width:18px;height:18px;border-radius:50%;background:var(--purple-dark);display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:500;color:white;flex-shrink:0;box-shadow:0 0 8px rgba(139,111,239,0.5)}
.list-section{font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.18);padding:8px 12px 4px}
.sidebar-footer{padding:14px 12px;border-top:1px solid var(--card-border);flex-shrink:0}
#new-chat-btn{width:100%;height:42px;display:flex;align-items:center;justify-content:center;gap:8px;background:#ffffff;color:#0a0a14;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.22s cubic-bezier(.34,1.56,.64,1),box-shadow 0.22s}
#new-chat-btn::after{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(255,255,255,0.2),transparent 70%);opacity:0;transition:opacity 0.3s}
#new-chat-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 0 26px rgba(255,255,255,0.4),0 8px 20px rgba(0,0,0,0.35)}
#new-chat-btn:hover::after{opacity:1}
#new-chat-btn:active{transform:scale(0.97)}

#sidebar-toggle{display:none;width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.55);transition:all 0.2s}
#sidebar-toggle:hover{background:rgba(139,111,239,0.15);border-color:rgba(139,111,239,0.3);color:rgba(255,255,255,0.9)}
@media(max-width:768px){
  #sidebar-toggle{display:flex}
  #sidebar{position:fixed;top:var(--header-h);left:0;bottom:0;z-index:50;width:min(320px,88vw);transform:translateX(-110%);transition:transform 0.35s cubic-bezier(.22,1,.36,1);border-right:1px solid var(--card-border)}
  #sidebar.open{transform:translateX(0)}
  .header-badge{display:none}
  #messages{padding:16px}
  .msg-row{max-width:88%}
}
</style>
</head>
<body>
<canvas id="cosmos"></canvas>
<div class="nebula n1"></div>
<div class="nebula n2"></div>
<div class="nebula n3"></div>

<div id="app">
  <header id="header">
    <div class="header-left">
      <button id="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </div>
      <span class="header-title">WOFES AI</span>
      <span class="header-badge">v2</span>
    </div>
    <div class="header-right">
      <div class="avatar-btn" title="User profile">U</div>
      <button class="logout-btn" onclick="logout()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        ВЫЙТИ
      </button>
    </div>
  </header>

  <div id="body">
    <div id="chat-area">
      <div id="messages"></div>

      <div id="input-bar">
        <textarea id="msg-input" placeholder="Сообщение WOFES AI..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="send-btn" onclick="sendMessage()" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0a0a14" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">ЧАТЫ</div>
        <div class="sidebar-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Поиск чатов..." oninput="filterChats(this.value)">
        </div>
      </div>

      <div id="chat-list">
        <div class="chat-item active" onclick="selectChat(this)">
          <div class="chat-icon">🌌</div>
          <div class="chat-info"><div class="chat-name">Основной чат</div><div class="chat-preview"></div></div>
          <div class="chat-time">сейчас</div>
        </div>
      </div>

      <div class="sidebar-footer">
        <button id="new-chat-btn" onclick="newChat()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0a0a14" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Новый чат
        </button>
      </div>
    </aside>
  </div>
</div>

<script>
// ========== ТВОИ КЛЮЧИ OPENROUTER ==========
const OPENROUTER_KEYS = [
  "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",
  "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",
  "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",
  "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",
  "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",
  "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",
  "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",
  "sk-or-v1-b1d8f7a2e3c4d5e6f7a8b9c0d1e2f3g4h5i6j7k8l9m0n1o2p3q4r5s6t7u8v9w0"
];
const OPENROUTER_URL = "https://openrouter.ai/api/v1/chat/completions";
// Используем специальный роутер для бесплатных моделей
const OPENROUTER_MODEL = "openrouter/free";

// ========== ФУНКЦИЯ ДЛЯ ЗАПРОСА ==========
async function fetchAIResponse(history) {
  for (let i = 0; i < OPENROUTER_KEYS.length; i++) {
    const key = OPENROUTER_KEYS[i];
    try {
      console.log(`🔄 Trying OpenRouter key ${i + 1}/${OPENROUTER_KEYS.length}...`);
      
      const response = await fetch(OPENROUTER_URL, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${key}`,
          'Content-Type': 'application/json',
          'HTTP-Referer': 'https://wofes-ai.local',
          'X-Title': 'WOFES AI v2'
        },
        body: JSON.stringify({
          model: OPENROUTER_MODEL,
          messages: history
        })
      });

      if (response.ok) {
        const data = await response.json();
        if (data.choices && data.choices[0]) {
          console.log(`✅ OpenRouter key ${i + 1} success`);
          return data;
        }
      }
      console.log(`❌ Key ${i + 1} failed`);
      
    } catch (error) {
      console.log(`❌ Key ${i + 1} error: ${error.message}`);
    }
  }
  throw new Error('All OpenRouter keys failed');
}

// ========== ОТПРАВКА СООБЩЕНИЯ ==========
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  // Проверка лимитов (3 запроса в час)
  const userId = localStorage.getItem('wofes_user') || 'guest';
  const limits = JSON.parse(localStorage.getItem('wofes_limits') || '{}');
  const now = Date.now();
  
  const isEnglish = /^[a-zA-Z\s\d.,!?]+$/.test(text);
  const limitMessage = isEnglish 
    ? "You've used all 3 requests for this hour. Try again in an hour."
    : "Ваши 3 запроса на этот час исчерпаны. Попробуйте через час.";
  
  if (!limits[userId] || now > limits[userId].resetTime) {
    limits[userId] = { count: 1, resetTime: now + 60 * 60 * 1000 };
  } else if (limits[userId].count >= 3) {
    addMessageToUI('ai', limitMessage);
    input.value = '';
    return;
  } else {
    limits[userId].count++;
  }
  localStorage.setItem('wofes_limits', JSON.stringify(limits));

  const currentChat = chats.find(c => c.id === currentChatId);
  if (!currentChat) return;

  currentChat.messages.push({ role: 'user', content: text });
  addMessageToUI('user', text);
  currentChat.preview = text.substring(0, 30);
  renderChatList();
  input.value = '';
  autoResize(input);

  showTyping();

  try {
    const history = currentChat.messages.slice(-10).map(m => ({
      role: m.role,
      content: m.content
    }));

    const data = await fetchAIResponse(history);
    hideTyping();
    
    const reply = data.choices[0].message.content;
    currentChat.messages.push({ role: 'assistant', content: reply });
    addMessageToUI('ai', reply);

  } catch (error) {
    hideTyping();
    addMessageToUI('ai', '❌ Ошибка: не удалось получить ответ. Попробуйте ещё раз.');
    console.error('API error:', error);
  }
}

// ========== ЗВЁЗДНОЕ НЕБО ==========
const canvas = document.getElementById('cosmos');
const ctx = canvas.getContext('2d');
let W, H, stars = [], shooters = [];
const STAR_COUNT = 280;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
const rand = (a,b) => a + Math.random()*(b-a);

function mkStar() {
  return {
    x: Math.random()*W, y: Math.random()*H,
    r: rand(0.3,1.6), baseAlpha: rand(0.2,0.9), alpha:0,
    twinkleSpeed: rand(0.004,0.018), twinklePhase: Math.random()*Math.PI*2,
    driftX: rand(-0.012,0.012), driftY: rand(-0.006,0.006),
    hue: Math.random()<0.15?260:(Math.random()<0.1?200:0),
    sat: Math.random()<0.2?80:0
  };
}
function initStars() { stars = Array.from({length:STAR_COUNT}, mkStar); }

function mkShooter() {
  return {
    x: rand(0,W*0.8), y: rand(0,H*0.4),
    len: rand(80,200), speed: rand(6,14), angle: rand(15,45)*Math.PI/180,
    life:1, decay: rand(0.012,0.025), active:true
  };
}

let shooterTimer = 0;
function maybeShoot(dt) {
  shooterTimer += dt;
  if (shooterTimer > rand(2500,5500)) {
    shooters.push(mkShooter());
    shooterTimer = 0;
  }
  shooters = shooters.filter(s => s.active);
}

let lastTs = 0;
function draw(ts) {
  const dt = ts - lastTs; lastTs = ts;
  ctx.clearRect(0,0,W,H);

  const bg = ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,Math.max(W,H)*.75);
  bg.addColorStop(0,'#0b0620'); bg.addColorStop(.5,'#060412'); bg.addColorStop(1,'#03020a');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  for (const s of stars) {
    s.twinklePhase += s.twinkleSpeed;
    s.alpha = s.baseAlpha*(0.5+0.5*Math.sin(s.twinklePhase));
    s.x += s.driftX; s.y += s.driftY;
    if (s.x<-2) s.x=W+2; if (s.x>W+2) s.x=-2; if (s.y<-2) s.y=H+2; if (s.y>H+2) s.y=-2;
    
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle = s.sat>0 ? `hsla(${s.hue},${s.sat}%,85%,${s.alpha})` : `rgba(255,255,255,${s.alpha})`;
    ctx.fill();
    
    if (s.r>1.1) {
      const g = ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*5);
      g.addColorStop(0,`rgba(200,180,255,${s.alpha*.3})`);
      g.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r*5,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    }
  }

  maybeShoot(dt);
  for (const s of shooters) {
    const ex = s.x + Math.cos(s.angle)*s.len*s.life;
    const ey = s.y + Math.sin(s.angle)*s.len*s.life;
    const g = ctx.createLinearGradient(s.x,s.y,ex,ey);
    g.addColorStop(0,'rgba(255,255,255,0)');
    g.addColorStop(.7,`rgba(255,255,255,${s.life*.6})`);
    g.addColorStop(1,`rgba(255,255,255,${s.life})`);
    ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(ex,ey);
    ctx.strokeStyle=g; ctx.lineWidth=1.5; ctx.stroke();
    s.x += Math.cos(s.angle)*s.speed;
    s.y += Math.sin(s.angle)*s.speed;
    s.life -= s.decay;
    if (s.life <= 0) s.active = false;
  }
  
  requestAnimationFrame(draw);
}

resize(); initStars();
window.addEventListener('resize', () => { resize(); initStars(); });
requestAnimationFrame(draw);

// ========== ФУНКЦИИ ЧАТА ==========
function getNow() {
  const d = new Date();
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function addMessageToUI(role, content, chatId = currentChatId) {
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  
  const avatarHtml = role === 'ai' ? 
    `<div class="msg-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>` : '';
  
  row.innerHTML = `${avatarHtml}<div><div class="bubble">${escapeHtml(content)}</div><div class="msg-meta">${getNow()}</div></div>`;
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('messages');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'typing-row';
  typingDiv.id = 'typing-indicator';
  typingDiv.innerHTML = `
    <div class="msg-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
    <div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  `;
  container.appendChild(typingDiv);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ========== УПРАВЛЕНИЕ ЧАТАМИ ==========
let chats = [{
  id: 'main',
  name: 'Основной чат',
  messages: [],
  preview: ''
}];
let currentChatId = 'main';

function renderChatList() {
  const list = document.getElementById('chat-list');
  list.innerHTML = '';
  
  chats.forEach(chat => {
    const item = document.createElement('div');
    item.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
    item.setAttribute('data-chat-id', chat.id);
    item.innerHTML = `
      <div class="chat-icon">🌌</div>
      <div class="chat-info">
        <div class="chat-name">${chat.name}</div>
        <div class="chat-preview">${chat.preview || ''}</div>
      </div>
      <div class="chat-time">сейчас</div>
    `;
    item.onclick = () => selectChat(chat.id);
    list.appendChild(item);
  });
}

function selectChat(chatId) {
  const chat = chats.find(c => c.id === chatId);
  if (!chat) return;
  
  currentChatId = chatId;
  
  const container = document.getElementById('messages');
  container.innerHTML = '';
  
  chat.messages.forEach(msg => {
    addMessageToUI(msg.role, msg.content, chatId);
  });
  
  renderChatList();
}

function newChat() {
  const newId = 'chat_' + Date.now();
  const newChatObj = {
    id: newId,
    name: `Чат ${chats.length + 1}`,
    messages: [],
    preview: ''
  };
  chats.push(newChatObj);
  renderChatList();
  selectChat(newId);
}

function filterChats(q) {
  const ql = q.toLowerCase();
  document.querySelectorAll('.chat-item').forEach(item => {
    const name = item.querySelector('.chat-name')?.textContent.toLowerCase() || '';
    item.style.display = name.includes(ql) ? '' : 'none';
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function logout() {
  window.location.href = 'login.html';
}

document.addEventListener('click', e => {
  if (window.innerWidth > 768) return;
  const sb = document.getElementById('sidebar');
  const toggle = document.getElementById('sidebar-toggle');
  if (sb.classList.contains('open') && !sb.contains(e.target) && !toggle.contains(e.target)) {
    sb.classList.remove('open');
  }
});

renderChatList();
</script>
